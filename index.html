<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LexMada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #0D1B2A;
  --navy-mid:   #162436;
  --navy-light: #1E3248;
  --gold:       #C9A84C;
  --gold-light: #E2C97A;
  --gold-glow:  rgba(201,168,76,0.18);
  --cream:      #F5F0E8;
  --cream-dim:  rgba(245,240,232,0.55);
  --green:      #2D6A4F;
  --green-light:#52B788;
  --orange:     #E8906A;
}

html, body {
  height: 100%; background: var(--navy);
  color: var(--cream); font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* ──────────────── SCREENS ──────────────── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.38s ease, transform 0.38s ease;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--navy);
}
.screen.active   { opacity: 1; pointer-events: all; transform: translateX(0); }
.screen.from-right { transform: translateX(100%); }
.screen.from-left  { transform: translateX(-100%); }

/* ──────────────── SPLASH ──────────────── */
#splash {
  position: fixed; inset: 0; z-index: 200;
  background: var(--navy);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.7s ease, transform 0.7s ease;
}
#splash.exit { opacity: 0; transform: scale(1.06); pointer-events: none; }

.splash-emblem {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px; position: relative;
  opacity: 0; animation: fadeIn 0.6s ease 0.3s forwards;
}
.splash-emblem::before {
  content: ''; position: absolute; inset: 5px;
  border-radius: 50%; border: 1px solid rgba(201,168,76,0.3);
}
.emblem-icon { font-size: 28px; }

#logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 900;
  letter-spacing: 6px; color: var(--gold);
  text-transform: uppercase;
  display: flex; min-height: 54px; align-items: center;
}
#logo-text span {
  display: inline-block; opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.22s ease, transform 0.22s ease;
}
#logo-text span.show { opacity: 1; transform: translateY(0); }

.splash-sub {
  margin-top: 14px; font-size: 11px;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--cream-dim);
  opacity: 0; animation: fadeIn 0.5s ease 1.8s forwards;
}

/* ──────────────── HOME ──────────────── */
.app-header {
  padding: 52px 24px 20px; text-align: center;
  flex-shrink: 0;
}
.app-logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 900;
  color: var(--gold); letter-spacing: 5px; text-transform: uppercase;
}
.app-tagline {
  margin-top: 6px; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--cream-dim);
}
.divider {
  width: 40px; height: 1px; background: var(--gold);
  margin: 20px auto; opacity: 0.5; flex-shrink: 0;
}
.section-label {
  text-align: center; font-size: 10px;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--cream-dim); margin-bottom: 24px; flex-shrink: 0;
}

.levels { padding: 0 20px 48px; display: flex; flex-direction: column; gap: 16px; }

/* ──────────────── LEVEL CARD ──────────────── */
.level-card {
  background: var(--navy-mid); border-radius: 16px;
  border: 1px solid rgba(201,168,76,0.12); overflow: hidden;
  cursor: pointer; transition: transform 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.level-card.unlocked:active { transform: scale(0.975); }
.level-card.locked { cursor: default; opacity: 0.58; }

.card-top {
  padding: 20px 20px 16px;
  display: flex; align-items: flex-start; gap: 14px;
}
.level-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.accent-gold   .level-icon { background: rgba(201,168,76,0.14); }
.accent-green  .level-icon { background: rgba(82,183,136,0.12); }
.accent-orange .level-icon { background: rgba(232,144,106,0.12); }

.level-info { flex: 1; }
.level-num {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 3px; display: block;
}
.accent-gold   .level-num { color: var(--gold); }
.accent-green  .level-num { color: var(--green-light); }
.accent-orange .level-num { color: var(--orange); }

.level-title {
  font-family: 'Playfair Display', serif;
  font-size: 19px; font-weight: 700; color: var(--cream); line-height: 1.2;
}
.level-desc { margin-top: 4px; font-size: 12px; color: var(--cream-dim); line-height: 1.5; }

.lock-badge {
  flex-shrink: 0; font-size: 16px; opacity: 0.45; margin-top: 2px;
}

/* progress */
.card-progress { padding: 0 20px 16px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 10px; letter-spacing: 1px;
  color: var(--cream-dim); margin-bottom: 6px;
}
.progress-track {
  height: 4px; background: rgba(255,255,255,0.07);
  border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 99px;
  transition: width 1s ease 0.3s;
}
.accent-gold   .progress-fill { background: var(--gold); }
.accent-green  .progress-fill { background: var(--green-light); }
.accent-orange .progress-fill { background: var(--orange); }

/* module list on card */
.card-modules {
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 12px 20px 16px;
  display: flex; flex-direction: column; gap: 9px;
}
.module-row {
  display: flex; align-items: center; gap: 11px;
  font-size: 12.5px; color: var(--cream-dim);
}
.mod-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid rgba(201,168,76,0.35);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 9px; color: var(--cream-dim);
}
.mod-dot.done { background: var(--gold); border-color: var(--gold); color: var(--navy); }

/* CTA button */
.card-cta { padding: 0 20px 20px; }
.btn-enter {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s, transform 0.12s;
}
.btn-enter:active { transform: scale(0.97); opacity: 0.85; }
.accent-gold   .btn-enter { background: var(--gold);         color: var(--navy); }
.accent-green  .btn-enter { background: var(--green-light);  color: var(--navy); }
.accent-orange .btn-enter { background: var(--orange);       color: var(--navy); }

/* ──────────────── MODULE LIST SCREEN ──────────────── */
.screen-header {
  display: flex; align-items: center; gap: 14px;
  padding: 52px 20px 20px; flex-shrink: 0;
}
.btn-back {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid rgba(201,168,76,0.25); background: transparent;
  color: var(--gold); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
.screen-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--cream);
}
.screen-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--cream-dim); margin-top: 2px; }

.module-list { padding: 8px 20px 48px; display: flex; flex-direction: column; gap: 12px; }

.module-card {
  background: var(--navy-mid); border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 18px 18px 16px; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.module-card:active { transform: scale(0.975); border-color: rgba(201,168,76,0.3); }

.module-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.module-num-badge {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--gold-glow);
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--gold); flex-shrink: 0;
}
.module-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 700; color: var(--cream);
}
.lecon-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.lecon-chip {
  background: rgba(255,255,255,0.05); border-radius: 6px;
  padding: 4px 9px; font-size: 10.5px; color: var(--cream-dim);
  border: 1px solid rgba(255,255,255,0.07);
}

/* ──────────────── LEÇONS SCREEN ──────────────── */
.lecon-list { padding: 8px 20px 48px; display: flex; flex-direction: column; gap: 10px; }

.lecon-row {
  background: var(--navy-mid); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 16px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.lecon-row:active { transform: scale(0.975); border-color: rgba(201,168,76,0.3); }
.lecon-index {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(201,168,76,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--gold); flex-shrink: 0; font-weight: 600;
}
.lecon-index.done { background: var(--gold); border-color: var(--gold); color: var(--navy); }
.lecon-title-text { font-size: 13.5px; color: var(--cream); flex: 1; }
.lecon-arrow { color: var(--cream-dim); font-size: 14px; opacity: 0.5; }

/* ──────────────── BADGE MODAL ──────────────── */
#badge-modal {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(13,27,42,0.92); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
}
#badge-modal.show { opacity: 1; pointer-events: all; }

.badge-card {
  background: var(--navy-mid); border: 1px solid var(--gold);
  border-radius: 24px; padding: 40px 28px; text-align: center;
  max-width: 340px; width: 100%;
  transform: scale(0.88) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
#badge-modal.show .badge-card { transform: scale(1) translateY(0); }

.badge-glow {
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px; font-size: 48px;
  animation: pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0   rgba(201,168,76,0.25); }
  50%      { box-shadow: 0 0 0 18px rgba(201,168,76,0); }
}
.badge-title {
  font-family: 'Playfair Display', serif; font-size: 21px;
  font-weight: 700; color: var(--gold); margin-bottom: 6px;
}
.badge-level {
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--cream-dim); margin-bottom: 14px;
}
.badge-desc { font-size: 12.5px; color: var(--cream-dim); line-height: 1.6; margin-bottom: 26px; }
.btn-close-badge {
  width: 100%; padding: 13px; border-radius: 10px;
  border: 1px solid var(--gold); background: transparent;
  color: var(--gold); font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background 0.15s;
}
.btn-close-badge:active { background: var(--gold-glow); }

/* particles */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 301; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  animation: fly var(--dur) ease forwards;
  left: var(--x); top: 100%; opacity: 0;
}
@keyframes fly {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(var(--vy)) scale(0); }
}

@keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<!-- ──── SPLASH ──── -->
<div id="splash">
  <div class="splash-emblem"><span class="emblem-icon">⚖️</span></div>
  <div id="logo-text"></div>
  <p class="splash-sub">Droit · Formation · Madagascar</p>
</div>

<!-- ──── SCREEN: HOME ──── -->
<div class="screen from-right" id="screen-home">
  <div class="app-header">
    <div class="app-logo">LexMada</div>
    <div class="app-tagline">Votre parcours juridique</div>
  </div>
  <div class="divider"></div>
  <p class="section-label">Choisissez votre niveau</p>
  <div class="levels" id="levels-container"></div>
</div>

<!-- ──── SCREEN: MODULE LIST ──── -->
<div class="screen from-right" id="screen-modules">
  <div class="screen-header">
    <button class="btn-back" onclick="goBack('screen-modules','screen-home')">‹</button>
    <div>
      <div class="screen-title" id="mod-screen-title">Modules</div>
      <div class="screen-sub" id="mod-screen-sub"></div>
    </div>
  </div>
  <div class="module-list" id="module-list-container"></div>
</div>

<!-- ──── SCREEN: LEÇON LIST ──── -->
<div class="screen from-right" id="screen-lecons">
  <div class="screen-header">
    <button class="btn-back" onclick="goBack('screen-lecons','screen-modules')">‹</button>
    <div>
      <div class="screen-title" id="lecon-screen-title">Leçons</div>
      <div class="screen-sub" id="lecon-screen-sub"></div>
    </div>
  </div>
  <div class="lecon-list" id="lecon-list-container"></div>
</div>

<!-- ──── BADGE MODAL ──── -->
<div id="badge-modal">
  <div class="badge-card">
    <div class="badge-glow" id="badge-icon">🏅</div>
    <div class="badge-title"  id="badge-title">Badge</div>
    <div class="badge-level"  id="badge-level">Complété</div>
    <div class="badge-desc"   id="badge-desc"></div>
    <button class="btn-close-badge" onclick="closeBadge()">Continuer</button>
  </div>
</div>
<div class="particles" id="particles"></div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const formations = [
  {
    niveau: "Débutant",
    icon: "📖",
    accent: "accent-gold",
    desc: "Les fondements du droit. Aucun prérequis.",
    badge: { icon:"🏅", title:"Badge Initié du Droit",   desc:"Vous maîtrisez les fondements du droit. Ce badge honore votre premier pas sérieux dans le monde juridique." },
    modules: [
      { id:1, titre:"Introduction au droit",    lecons:["Qu'est-ce que le droit ?","Les rôles du droit","Les branches du droit","Les professions juridiques"] },
      { id:2, titre:"Les sources du droit",     lecons:["La Constitution","La loi","La jurisprudence","La coutume"] }
    ]
  },
  {
    niveau: "Intermédiaire",
    icon: "⚖️",
    accent: "accent-green",
    desc: "Droit des affaires, procédures, contrats avancés.",
    badge: { icon:"⚖️", title:"Badge Juriste en Herbe",  desc:"Vous naviguez désormais dans des notions complexes. Ce badge témoigne de votre persévérance." },
    modules: [
      { id:1, titre:"Droit des sociétés", lecons:["La SARL","La SA","Les associés","Les dirigeants"] }
    ]
  },
  {
    niveau: "Avancé",
    icon: "🏛️",
    accent: "accent-orange",
    desc: "Jurisprudence, droit constitutionnel, contentieux.",
    badge: { icon:"🏛️", title:"Badge Expert LexMada",   desc:"Félicitations. Vous avez atteint le sommet du parcours LexMada. Un accomplissement remarquable." },
    modules: [
      { id:1, titre:"Contentieux complexes", lecons:["Stratégie procédurale","Rédaction de conclusions","Voies de recours","Jurisprudence avancée"] }
    ]
  }
];

/* progression en mémoire (clé: "niveauIndex-moduleId-leconIndex") */
const done = new Set();
let currentNiveauIdx = 0;
let currentModuleIdx = 0;

/* ═══════════════════════════════════════════
   SPLASH
═══════════════════════════════════════════ */
const logoEl = document.getElementById('logo-text');
"LEXMADA".split('').forEach(ch => {
  const s = document.createElement('span');
  s.textContent = ch; logoEl.appendChild(s);
});
logoEl.querySelectorAll('span').forEach((s,i) =>
  setTimeout(() => s.classList.add('show'), 700 + i*130));

setTimeout(() => {
  document.getElementById('splash').classList.add('exit');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    showScreen('screen-home');
    buildHome();
  }, 700);
}, 2800);

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.transform = '';
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
}

function goTo(id) {
  const el = document.getElementById(id);
  el.style.transform = 'translateX(100%)';
  el.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { el.style.transition = 'transform 0.32s ease, opacity 0.32s ease'; el.style.transform = 'translateX(0)'; });
  });
  // hide others
  document.querySelectorAll('.screen.active').forEach(s => {
    if (s.id !== id) { s.style.transform = 'translateX(-30%)'; s.classList.remove('active'); }
  });
}

function goBack(fromId, toId) {
  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);
  to.style.transform = 'translateX(-30%)';
  to.classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    to.style.transition   = 'transform 0.32s ease';
    to.style.transform    = 'translateX(0)';
    from.style.transition = 'transform 0.32s ease';
    from.style.transform  = 'translateX(100%)';
    setTimeout(() => { from.classList.remove('active'); from.style.transform=''; from.style.transition=''; }, 340);
  }));
}

/* ═══════════════════════════════════════════
   BUILD HOME
═══════════════════════════════════════════ */
function buildHome() {
  const container = document.getElementById('levels-container');
  container.innerHTML = '';

  formations.forEach((f, fi) => {
    const unlocked = fi === 0; // TODO: real unlock logic
    const totalLecons = f.modules.reduce((s,m) => s + m.lecons.length, 0);
    const doneLecons  = f.modules.reduce((s,m) =>
      s + m.lecons.filter((_,li) => done.has(`${fi}-${m.id}-${li}`)).length, 0);
    const pct = totalLecons ? Math.round(doneLecons/totalLecons*100) : 0;

    const card = document.createElement('div');
    card.className = `level-card ${f.accent} ${unlocked ? 'unlocked' : 'locked'}`;
    if (unlocked) card.onclick = () => openNiveau(fi);

    const moduleRows = f.modules.map((m,mi) => {
      const allDone = m.lecons.every((_,li) => done.has(`${fi}-${m.id}-${li}`));
      return `<div class="module-row">
        <div class="mod-dot ${allDone?'done':''}">${allDone?'✓':(mi+1)}</div>
        <span>${m.titre}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-top">
        <div class="level-icon">${f.icon}</div>
        <div class="level-info">
          <span class="level-num">Niveau 0${fi+1}</span>
          <div class="level-title">${f.niveau}</div>
          <div class="level-desc">${f.desc}</div>
        </div>
        ${!unlocked ? `<div class="lock-badge">🔒</div>` : ''}
      </div>
      <div class="card-progress">
        <div class="progress-meta">
          <span>${unlocked ? 'Progression' : 'Débloqué après ' + formations[fi-1].niveau}</span>
          <span>${doneLecons} / ${totalLecons} leçons</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      ${unlocked ? `
      <div class="card-modules">${moduleRows}</div>
      <div class="card-cta">
        <button class="btn-enter" onclick="event.stopPropagation(); openNiveau(${fi})">
          ${doneLecons===0 ? 'Commencer →' : pct===100 ? 'Revoir →' : 'Continuer →'}
        </button>
      </div>` : ''}
    `;
    container.appendChild(card);
  });
}

/* ═══════════════════════════════════════════
   NIVEAU → MODULE LIST
═══════════════════════════════════════════ */
function openNiveau(fi) {
  currentNiveauIdx = fi;
  const f = formations[fi];

  document.getElementById('mod-screen-title').textContent = f.niveau;
  document.getElementById('mod-screen-sub').textContent = `${f.modules.length} module${f.modules.length>1?'s':''}`;

  const container = document.getElementById('module-list-container');
  container.innerHTML = '';

  f.modules.forEach((m, mi) => {
    const card = document.createElement('div');
    card.className = 'module-card';
    card.onclick = () => openModule(fi, mi);

    const chips = m.lecons.map(l => `<span class="lecon-chip">${l}</span>`).join('');
    card.innerHTML = `
      <div class="module-card-top">
        <div class="module-num-badge">${String(m.id).padStart(2,'0')}</div>
        <div class="module-card-title">${m.titre}</div>
      </div>
      <div class="lecon-chips">${chips}</div>
    `;
    container.appendChild(card);
  });

  goTo('screen-modules');
}

/* ═══════════════════════════════════════════
   MODULE → LEÇON LIST
═══════════════════════════════════════════ */
function openModule(fi, mi) {
  currentNiveauIdx = fi;
  currentModuleIdx = mi;
  const f = formations[fi];
  const m = f.modules[mi];

  document.getElementById('lecon-screen-title').textContent = m.titre;
  document.getElementById('lecon-screen-sub').textContent = `${m.lecons.length} leçons — ${f.niveau}`;

  const container = document.getElementById('lecon-list-container');
  container.innerHTML = '';

  m.lecons.forEach((l, li) => {
    const isDone = done.has(`${fi}-${m.id}-${li}`);
    const row = document.createElement('div');
    row.className = 'lecon-row';
    row.onclick = () => toggleLecon(fi, mi, li, m.id);
    row.innerHTML = `
      <div class="lecon-index ${isDone?'done':''}">${isDone?'✓':(li+1)}</div>
      <div class="lecon-title-text">${l}</div>
      <div class="lecon-arrow">›</div>
    `;
    container.appendChild(row);
  });

  goTo('screen-lecons');
}

/* ═══════════════════════════════════════════
   TOGGLE LEÇON DONE
═══════════════════════════════════════════ */
function toggleLecon(fi, mi, li, moduleId) {
  const key = `${fi}-${moduleId}-${li}`;
  if (done.has(key)) { done.delete(key); }
  else               { done.add(key); }

  // rebuild lecon list in place
  openModule(fi, mi);
  buildHome();

  // check if whole niveau is done → badge
  const f = formations[fi];
  const allDone = f.modules.every(m =>
    m.lecons.every((_,idx) => done.has(`${fi}-${m.id}-${idx}`))
  );
  if (allDone) {
    setTimeout(() => showBadge(fi), 400);
  }
}

/* ═══════════════════════════════════════════
   BADGE
═══════════════════════════════════════════ */
function showBadge(fi) {
  const b = formations[fi].badge;
  document.getElementById('badge-icon').textContent  = b.icon;
  document.getElementById('badge-title').textContent = b.title;
  document.getElementById('badge-level').textContent = `Niveau 0${fi+1} — ${formations[fi].niveau} — Complété`;
  document.getElementById('badge-desc').textContent  = b.desc;
  document.getElementById('badge-modal').classList.add('show');
  launchParticles();
}
function closeBadge() {
  document.getElementById('badge-modal').classList.remove('show');
  document.getElementById('particles').innerHTML = '';
}
function launchParticles() {
  const c = document.getElementById('particles'); c.innerHTML = '';
  const cols = ['#C9A84C','#E2C97A','#F5F0E8','#52B788','#E8906A'];
  for (let i=0;i<36;i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.cssText = `--x:${8+Math.random()*84}%;--dur:${0.8+Math.random()*1.3}s;--vy:-${160+Math.random()*220}px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${4+Math.random()*7}px;height:${4+Math.random()*7}px;animation-delay:${Math.random()*0.45}s;`;
    c.appendChild(p);
  }
}
</script>
